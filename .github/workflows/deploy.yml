name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/davidkalina

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            dockerfile: apps/backend/Dockerfile
          - service: worker
            dockerfile: apps/backend/worker.Dockerfile
          - service: websocket
            dockerfile: apps/websocket/Dockerfile
          - service: filter-processor
            dockerfile: apps/filter-processor/Dockerfile
          - service: web-dashboard
            dockerfile: apps/web-dashboard/Dockerfile
          - service: postgres
            dockerfile: postgres.Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/rtm-${{ matrix.service }}:latest
            ${{ env.IMAGE_PREFIX }}/rtm-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - name: Deploy to droplet
        uses: appleboy/ssh-action@v1
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: GITHUB_ACTOR,DEPLOY_TOKEN
          script_stop: true
          script: |
            set -e
            cd /opt/realtime-markers-demo

            echo "==> Pulling latest config..."
            git fetch origin master
            git reset --hard origin/master

            echo "==> Logging into container registry..."
            echo "$DEPLOY_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            echo "==> Pulling images..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull

            echo "==> Running migrations..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d postgres redis
            sleep 10
            docker compose -f docker-compose.yml -f docker-compose.prod.yml run --rm \
              -w /app/apps/backend backend pnpm migration:run || echo "Warning: migration step failed (non-fatal)"

            echo "==> Starting services..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans

            echo "==> Cleaning up old images..."
            docker image prune -f

            echo "==> Deploy complete!"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps
